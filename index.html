<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Debate Cafe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'M PLUS Rounded 1c', sans-serif; }
        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fdf2f8; }
        ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #f472b6; }

        /* フェードインアニメーション */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-enter {
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* タイピングアニメーション */
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* トースト通知 */
        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            background: rgba(244, 114, 182, 0.95);
            color: white;
            padding: 12px 20px;
            border-radius: 9999px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            animation: fadeIn 0.3s ease-out forwards, fadeOut 0.3s ease-in forwards 2.7s;
            opacity: 0;
            font-weight: bold;
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; display: none; }
        }
    </style>
</head>
<body class="bg-pink-50 text-gray-800 h-screen flex flex-col overflow-hidden">

    <!-- ナビゲーションバー -->
    <header class="bg-white border-b border-pink-200 p-4 flex justify-between items-center shadow-sm shrink-0">
        <div class="flex items-center gap-3">
            <div class="bg-pink-400 p-2 rounded-full text-white shadow-sm">
                <i class="fa-solid fa-mug-hot text-xl"></i>
            </div>
            <h1 class="text-xl font-bold text-pink-500 tracking-wider hidden sm:block">World Debate Cafe</h1>
        </div>
        <div class="flex items-center gap-6">
            <div class="text-right">
                <div class="text-xs text-pink-400 font-bold uppercase tracking-wide">スマイルポイント</div>
                <div class="text-lg font-bold text-pink-600" id="score-display">0 ✨</div>
            </div>
            <div class="text-right">
                <div class="text-xs text-orange-400 font-bold uppercase tracking-wide">称号</div>
                <div class="text-lg font-bold text-orange-500" id="rank-display">おためしさん</div>
            </div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        
        <!-- サイドバー：ニュースフィード -->
        <aside class="w-full md:w-1/3 lg:w-1/4 bg-pink-50 border-r border-pink-200 flex flex-col shrink-0 border-b md:border-b-0 md:h-full">

            </div>
            <!-- モバイル時は横スクロール、PC時は縦スクロール -->

                <!-- トピックリストがここにJSで生成される -->
            </div>
        </aside>

        <!-- ディベートエリア -->
        <section class="flex-1 flex flex-col bg-white relative min-h-0">
            
            <!-- トピックヘッダー -->
            <div class="p-3 md:p-6 border-b border-pink-100 bg-white shrink-0 shadow-sm z-10 flex flex-col gap-2">
                <div class="flex justify-between items-start">
                    <span class="bg-pink-100 text-pink-600 text-[10px] md:text-xs px-2 py-1 rounded-full font-bold shadow-sm" id="topic-category">おかし・スイーツ</span>
                    <span class="text-xs text-gray-400 font-bold hidden md:inline" id="topic-source">カフェのマスターより</span>
                </div>
                <h2 class="text-base md:text-2xl font-bold leading-tight text-gray-800" id="topic-title">きのこの山 vs たけのこの里、永遠のライバル対決！</h2>
                <p class="text-xs text-gray-600 hidden md:block" id="topic-summary">チョコレートとビスケットの絶妙なハーモニー。あなたはどっち派ですか？それぞれの魅力を存分に語り合いましょう！</p>
                
                <!-- 参考資料セクション（折りたたみ式） -->
                <details class="bg-yellow-50 rounded-lg p-2 md:p-3 border border-yellow-200 shadow-sm text-xs cursor-pointer group">
                    <summary class="font-bold text-yellow-600 tracking-wider outline-none select-none list-none flex items-center justify-between">
                        <span><i class="fa-solid fa-lightbulb mr-1"></i> ヒント・参考サイト</span>
                        <i class="fa-solid fa-chevron-down transition-transform group-open:rotate-180 text-yellow-500"></i>
                    </summary>

            </div>

            <!-- チャットエリア -->
            <div class="flex-1 overflow-y-auto p-3 md:p-6 space-y-4 bg-slate-50/50" id="chat-container">
                <!-- メッセージがここに生成される -->
            </div>

            <!-- タイピングインジケーター（隠し） -->
            <div id="typing-indicator" class="hidden px-6 pb-2 text-sm text-pink-400 flex items-center gap-2 font-bold mt-2">
                <i class="fa-solid fa-paw"></i> 常連さんが入力中...
                <div class="flex gap-1 ml-1">
                    <div class="w-1.5 h-1.5 bg-pink-400 rounded-full typing-dot"></div>
                    <div class="w-1.5 h-1.5 bg-pink-400 rounded-full typing-dot"></div>
                    <div class="w-1.5 h-1.5 bg-pink-400 rounded-full typing-dot"></div>
                </div>
            </div>

            <!-- 入力エリア -->
            <div class="p-2 md:p-4 bg-pink-50 border-t border-pink-200 shrink-0">
                <div class="max-w-4xl mx-auto flex flex-col gap-2 md:gap-3">
                    <div class="flex gap-1.5 md:gap-2">
                        <button class="stance-btn active flex-1 py-1.5 md:py-2 rounded-full border border-blue-300 bg-blue-100 text-blue-700 font-bold transition text-xs md:text-sm shadow-sm hover:shadow-md" data-stance="neutral">🤔 なやむ</button>
                        <button class="stance-btn flex-1 py-1.5 md:py-2 rounded-full border border-pink-200 bg-white text-gray-600 font-bold transition text-xs md:text-sm shadow-sm hover:shadow-md hover:bg-green-50" data-stance="agree">✨ さんせい</button>
                        <button class="stance-btn flex-1 py-1.5 md:py-2 rounded-full border border-pink-200 bg-white text-gray-600 font-bold transition text-xs md:text-sm shadow-sm hover:shadow-md hover:bg-red-50" data-stance="disagree">💦 はんたい</button>
                    </div>
                    <div class="flex gap-2 relative">
                        <textarea id="message-input" class="w-full bg-white border-2 border-pink-200 rounded-xl md:rounded-2xl p-2 md:p-3 text-sm focus:outline-none focus:border-pink-400 focus:ring-1 focus:ring-pink-400 resize-none shadow-inner text-gray-700 font-medium" rows="1" placeholder="あなたの意見を発信しよう..."></textarea>
                        <button id="send-btn" class="bg-pink-400 hover:bg-pink-500 text-white rounded-xl md:rounded-2xl px-4 md:px-6 font-bold transition flex items-center justify-center shrink-0 shadow-md text-sm md:text-base">
                            <i class="fa-solid fa-paper-plane md:mr-2"></i><span class="hidden md:inline">おくる</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast-container"></div>

    <script type="module">

        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let app, auth, db;
        let isOnline = false;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        
        let currentUser = null;
        let unsubscribeChat = null;
        
        const countries = ['🇯🇵', '🇺🇸', '🇬🇧', '🇫🇷', '🇩🇪', '🇮🇹', '🇨🇦', '🇦🇺', '🇧🇷', '🇮🇳', '🇰🇷', '🇸🇪'];
        const userCountry = countries[Math.floor(Math.random() * countries.length)];
        const userName = "あなた";

        // === カフェ風のゲームデータ ===
        const topics = [
            {

                summary: 'チョコレートとビスケットの絶妙なハーモニー。あなたはどっち派ですか？それぞれの魅力を存分に語り合いましょう！',
                references: [{ title: "きのこの山・たけのこの里 公式サイト", url: "https://www.meiji.co.jp/sweets/chocolate/kinotake/" }],

            },
            {
                id: 'fried-egg',
                category: '朝ごはん',
                title: '目玉焼きには何をつける？（お醤油？ソース？お塩？）',
                summary: '朝ごはんの定番、目玉焼き。かける調味料で好みが大きく分かれますよね。あなたの最高の組み合わせを教えて！',
                references: [],
                stances: { agree: 'お醤油派', disagree: 'ソース派', neutral: '塩 / その他' }
            },
            {
                id: 'time-machine',
                category: 'ふしぎ',
                title: 'タイムマシンがあったら、過去に行く？未来に行く？',
                summary: 'もしも一度だけタイムマシンが使えるとしたら。歴史的な瞬間を見に行く？それとも自分の未来を覗いてみる？',

                stances: { agree: '過去に行く', disagree: '未来に行く', neutral: 'なやむ / 今のまま' }
            },
            {
                id: 'dog-vs-cat',
                category: 'どうぶつ',
                title: '犬派？猫派？どっちの魅力も語り尽くそう！',
                summary: '人懐っこくて元気なワンちゃん、マイペースでツンデレなネコちゃん。どっちも可愛いけれど、あえて選ぶなら？',
                references: [],
                stances: { agree: '犬派', disagree: '猫派', neutral: 'なやむ / 両方' }
            },
            {
                id: 'summer-winter',
                category: 'きせつ',
                title: '夏と冬、ずっと過ごすならどっちの季節がいい？',
                summary: '海や花火が楽しい夏と、雪やあったかいお鍋が美味しい冬。一年中その季節だったら、どっちが幸せ？',
                references: [],
                stances: { agree: '夏がいい', disagree: '冬がいい', neutral: 'なやむ / 春・秋' }
            },
            {
                id: 'pancake-syrup',
                category: 'おかし・スイーツ',
                title: 'パンケーキにかけるなら、メイプルシロップ？はちみつ？',
                summary: 'ふかふかのパンケーキ。とろ〜りかけるなら、香ばしいメイプルシロップか、甘くて優しいはちみつか、迷っちゃうね！',
                references: [],
                stances: { agree: 'メイプル派', disagree: 'はちみつ派', neutral: 'バター / その他' }
            }
        ];

        // === BOTのセリフデータ ===
        const botResponses = {
            'kinoko-takenoko': [
                { stance: 'agree', name: 'きのこ大好きさん', text: 'きのこの山の、チョコだけ先に食べるのが好きなんだよね〜🍫✨' },
                { stance: 'disagree', name: 'たけのこ過激派', text: 'クッキー生地とチョコの一体感！たけのこの里こそ至高！💦' },
                { stance: 'neutral', name: '平和主義者', text: 'どっちも美味しいから、交互に食べるのが一番幸せだよ🌸' }
            ],
            'fried-egg': [
                { stance: 'agree', name: 'お醤油派', text: 'やっぱり日本人ならお醤油でしょ！ご飯にぴったり！✨' },
                { stance: 'disagree', name: 'ソース派', text: '目玉焼きには絶対ソース！あの甘辛さがたまらない！💦' },
                { stance: 'neutral', name: '塩コショウ派', text: 'シンプルに塩コショウが一番、卵の味が引き立つよ🍳' }
            ],
            'time-machine': [
                { stance: 'agree', name: '歴史ロマン', text: '恐竜がいた時代をこの目で見てみたいな〜！🦖✨' },
                { stance: 'disagree', name: '未来志向', text: '100年後の世界で、空飛ぶ車に乗ってみたい！🚗💨💦' },
                { stance: 'neutral', name: '現在が一番', text: '過去も未来も気になるけど、やっぱり今の生活が一番落ち着くかも🤔' }
            ],
            'dog-vs-cat': [
                { stance: 'agree', name: 'ワンコ愛好家', text: '帰ってきたらしっぽ振って喜んでくれる犬が可愛すぎる！🐶✨' },
                { stance: 'disagree', name: 'ネコ下僕', text: 'あのツンデレ具合がたまらない…猫様には一生勝てない🐈💦' },
                { stance: 'neutral', name: '動物全般好き', text: 'どっちも可愛くて選べない！もふもふできれば何でもいい！🐾' }
            ],
            'summer-winter': [
                { stance: 'agree', name: '夏満喫マン', text: '海！スイカ！花火！夏は楽しいイベントがいっぱい！🍉✨' },
                { stance: 'disagree', name: '冬ごもり', text: 'こたつでぬくぬくしながらアイスを食べるのが最高の贅沢…❄️💦' },
                { stance: 'neutral', name: '春・秋派', text: '暑すぎず寒すぎない、春か秋がずっと続けばいいのにな〜🌸🍁' }
            ],
            'pancake-syrup': [
                { stance: 'agree', name: 'メイプル信者', text: 'あの独特の香ばしい風味！パンケーキにはメイプル一択！🥞✨' },
                { stance: 'disagree', name: 'はちみつラバー', text: '自然な甘さのはちみつが、パンケーキを優しく包み込んでくれる🍯💦' },
                { stance: 'neutral', name: 'バターのみ', text: 'シロップなしで、バターの塩気だけで食べるのも美味しいよ！🧈' }
            ]
        };

        let currentTopicId = topics[0].id;
        let userScore = 0;
        let currentStance = 'neutral';
        const chats = {}; 

        const topicListEl = document.getElementById('topic-list');
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const stanceBtns = document.querySelectorAll('.stance-btn');
        const scoreDisplay = document.getElementById('score-display');
        const rankDisplay = document.getElementById('rank-display');

        async function initNetwork() {
            try {
                if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                    const firebaseConfig = JSON.parse(__firebase_config);
                    app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);
                    
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    currentUser = auth.currentUser;
                    isOnline = true;
                    showToast("みんなのカフェに接続しました☕️");
                    
                    onAuthStateChanged(auth, (user) => {
                        currentUser = user;
                        if (user && isOnline) {
                            selectTopic(currentTopicId); 
                        }
                    });
                } else {
                    console.log("Firebase config not found. Running in local mode.");
                    showToast("ローカルモードで開店しました🍰", "info");
                    isOnline = false;
                }
            } catch (error) {
                console.error("ネットワーク初期化エラー:", error);
                showToast("通信サーバーに接続できません。ローカルモードで動作します。", "error");
                isOnline = false;
            }
        }

        function init() {
            renderTopicList();
            selectTopic(topics[0].id);

            sendBtn.addEventListener('click', handleSendMessage);
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage();
                }
            });

            stanceBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    stanceBtns.forEach(b => {
                        b.classList.remove('bg-blue-100', 'border-blue-300', 'text-blue-700', 'bg-green-100', 'border-green-300', 'text-green-700', 'bg-red-100', 'border-red-300', 'text-red-700');
                        b.classList.add('bg-white', 'border-pink-200', 'text-gray-600');
                    });
                    currentStance = e.target.dataset.stance;
                    e.target.classList.remove('bg-white', 'border-pink-200', 'text-gray-600');
                    if (currentStance === 'neutral') e.target.classList.add('bg-blue-100', 'border-blue-300', 'text-blue-700');
                    if (currentStance === 'agree') e.target.classList.add('bg-green-100', 'border-green-300', 'text-green-700');
                    if (currentStance === 'disagree') e.target.classList.add('bg-red-100', 'border-red-300', 'text-red-700');
                });
            });
        }

        function subscribeToTopic(topicId) {
            if (!isOnline || !db) return;
            if (unsubscribeChat) {
                unsubscribeChat(); 
            }
            if (!currentUser) return;

            const messagesRef = collection(db, 'artifacts', appId, 'public', 'data', `messages_${topicId}`);
            
            unsubscribeChat = onSnapshot(messagesRef, (snapshot) => {
                const msgs = [];
                snapshot.forEach(doc => {
                    msgs.push({ id: doc.id, ...doc.data() });
                });
                msgs.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                chats[topicId] = msgs;
                renderMessages();
            }, (error) => {
                console.error("メッセージ取得エラー:", error);
            });
        }

        function renderTopicList() {
            topicListEl.innerHTML = '';
            topics.forEach(topic => {
                const isActive = topic.id === currentTopicId;
                const div = document.createElement('div');
                // モバイル時は横幅を固定して横スクロールのカードにする
                div.className = `p-3 rounded-xl cursor-pointer transition border-2 shrink-0 w-44 md:w-auto md:shrink ${isActive ? 'bg-pink-100 border-pink-400 shadow-md md:transform md:scale-[1.02]' : 'bg-white border-pink-100 hover:bg-pink-50 hover:border-pink-300 shadow-sm'}`;
                div.onclick = () => selectTopic(topic.id);
                div.innerHTML = `
                    <div class="text-[10px] md:text-xs text-pink-500 mb-1 font-bold line-clamp-1">${topic.category}</div>
                    <div class="text-xs md:text-sm font-bold text-gray-700 line-clamp-2 md:line-clamp-none">${topic.title}</div>
                    <div class="text-[10px] md:text-xs text-pink-400 mt-1 md:mt-2 flex justify-between font-bold">
                        <span><i class="fa-solid fa-users"></i> ${isOnline ? 'Live' : 'Local'}</span>
                    </div>
                `;
                topicListEl.appendChild(div);
            });
        }

        function selectTopic(id) {
            currentTopicId = id;
            const topic = topics.find(t => t.id === id);
            
            document.getElementById('topic-category').textContent = topic.category;
            document.getElementById('topic-title').textContent = topic.title;
            // モバイルではサマリーを隠しているが、データ自体は更新する
            if(document.getElementById('topic-summary')) document.getElementById('topic-summary').textContent = topic.summary;

            const refContainer = document.getElementById('topic-references');
            if (refContainer) {
                refContainer.innerHTML = '';
                if (topic.references && topic.references.length > 0) {
                    topic.references.forEach(ref => {
                        const li = document.createElement('li');
                        li.innerHTML = `<a href="${ref.url}" target="_blank" class="text-yellow-600 hover:text-yellow-500 transition flex items-center font-bold"><i class="fa-solid fa-link text-xs w-4"></i><span class="hover:underline">${ref.title}</span></a>`;
                        refContainer.appendChild(li);
                    });
                } else {
                    refContainer.innerHTML = '<li class="text-[10px] md:text-xs text-gray-500">参考サイトは特にありません。自由に語りましょう！</li>';
                }
            }

            // ★ スタンスボタンのテキストをお題に合わせて更新
            document.querySelector('[data-stance="neutral"]').innerHTML = `🤔 ${topic.stances.neutral}`;
            document.querySelector('[data-stance="agree"]').innerHTML = `✨ ${topic.stances.agree}`;
            document.querySelector('[data-stance="disagree"]').innerHTML = `💦 ${topic.stances.disagree}`;

            renderTopicList(); 
            
            if (isOnline) {
                subscribeToTopic(id);
            } else {
                if (!chats[id]) chats[id] = [];
                renderMessages();
            }
        }

        function renderMessages() {
            chatContainer.innerHTML = '';
            
            const currentTopic = topics.find(t => t.id === currentTopicId);
            const sysEl = document.createElement('div');
            sysEl.className = 'message-enter flex justify-center my-6';
            sysEl.innerHTML = `<span class="bg-pink-100 text-pink-600 text-xs px-5 py-2.5 rounded-full font-bold shadow-sm border border-pink-200">🌸 「${currentTopic.title}」のおしゃべりが始まったよ！</span>`;
            chatContainer.appendChild(sysEl);

            const messages = chats[currentTopicId] || [];
            const stanceIcons = { neutral: '🤔', agree: '✨', disagree: '💦' };
            
            messages.forEach(msg => {
                // "あなた" または "You" として表示する条件
                const isMine = msg.userId === currentUser?.uid || msg.userId.startsWith('local_user_');
                const msgEl = document.createElement('div');
                msgEl.className = 'message-enter flex gap-3 w-full ' + (isMine ? 'justify-end' : 'justify-start');
                
                // ★ 何派としての意見かを取得
                const stanceLabel = currentTopic.stances[msg.stance] || 'なやむ';

                // ★ スタンスごとのバッジカラーを設定
                let badgeColor = 'bg-gray-50 border-gray-200 text-gray-600';
                if (msg.stance === 'agree') badgeColor = 'bg-green-50 border-green-200 text-green-700';
                if (msg.stance === 'disagree') badgeColor = 'bg-red-50 border-red-200 text-red-700';
                if (msg.stance === 'neutral') badgeColor = 'bg-blue-50 border-blue-200 text-blue-700';

                if (isMine) {
                    msgEl.innerHTML = `
                        <div class="max-w-[85%] md:max-w-[75%] flex flex-col items-end gap-1.5 mt-2">
                            <div class="flex items-center gap-2 text-xs font-bold text-pink-400 mr-1">
                                <span class="rounded-full px-2 py-0.5 shadow-sm text-[10px] border ${badgeColor}">${stanceIcons[msg.stance]} ${stanceLabel}</span>
                                <span>${msg.name} ${msg.country || userCountry}</span>
                            </div>
                            <div class="bg-gradient-to-br from-pink-400 to-pink-500 text-white p-3.5 rounded-2xl rounded-tr-sm shadow text-sm leading-relaxed whitespace-pre-wrap font-medium">${msg.text}</div>
                            <div class="text-xs text-pink-400 flex items-center gap-1 font-bold mr-1">
                                <i class="fa-solid fa-heart text-pink-500"></i> ${msg.likes || 0}
                            </div>
                        </div>
                    `;
                } else {
                    msgEl.innerHTML = `
                        <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-xl shrink-0 border border-gray-200 shadow-sm mt-2 z-10">
                            ${msg.country || '🤖'}
                        </div>
                        <div class="max-w-[85%] md:max-w-[75%] flex flex-col items-start gap-1.5 mt-2">
                            <div class="text-xs font-bold text-gray-500 flex items-center gap-2 ml-1">
                                ${msg.name || 'Anonymous'}
                                <span class="rounded-full px-2 py-0.5 shadow-sm text-[10px] border ${badgeColor}">${stanceIcons[msg.stance]} ${stanceLabel}</span>
                            </div>
                            <div class="bg-white border border-gray-100 text-gray-800 p-3.5 rounded-2xl rounded-tl-sm shadow-sm text-sm leading-relaxed whitespace-pre-wrap font-medium">${msg.text}</div>
                            <div class="text-xs text-gray-400 flex items-center gap-3 font-bold ml-1">
                                <button class="hover:text-pink-400 transition flex items-center gap-1.5 bg-white px-2.5 py-1 rounded-full shadow-sm border border-gray-100 hover:border-pink-200 active:scale-95" onclick="likeMessage('${msg.id}', ${msg.likes || 0})">
                                    <i class="fa-solid fa-heart text-pink-300"></i> ${msg.likes || 0}
                                </button>
                            </div>
                        </div>
                    `;
                }
                chatContainer.appendChild(msgEl);
            });

            scrollToBottom();
        }

        // === BOTの返信ロジック ===
        function triggerBotResponse() {
            const indicator = document.getElementById('typing-indicator');
            indicator.classList.remove('hidden');
            scrollToBottom();

            // 1.5秒 〜 3秒後にBOTが返信する
            setTimeout(() => {
                indicator.classList.add('hidden');
                
                // 現在のトピックのBOT返信リストを取得（なければデフォルト）
                const responses = botResponses[currentTopicId] || [
                    { stance: 'neutral', name: 'カフェのマスター', text: 'なるほど〜！そういう考え方もあるね！🌸' }
                ];
                
                // ランダムに1つ選ぶ
                const randomResp = responses[Math.floor(Math.random() * responses.length)];
                
                const botMsg = {
                    id: 'bot_' + Date.now(),
                    text: randomResp.text,
                    stance: randomResp.stance,
                    userId: 'bot_user',
                    name: randomResp.name,
                    country: '🤖',
                    timestamp: Date.now(),
                    likes: 0
                };

                // オンラインの場合はFirestoreに書き込むと他の人にも見えてしまうため、
                // 今回は「自分専用のBOT」としてローカルの配列にのみ追加して表示させる
                if (!chats[currentTopicId]) chats[currentTopicId] = [];
                chats[currentTopicId].push(botMsg);
                renderMessages();
                
            }, 1500 + Math.random() * 1500);
        }

        async function handleSendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            if (isOnline && !currentUser) {
                showToast("ただいま通信の準備中だよ！少し待ってからもう一度送ってね☕️", "info");
                return;
            }

            const messageData = {
                id: 'msg_' + Date.now(), 
                text: text,
                stance: currentStance,
                userId: currentUser?.uid || 'local_user_' + Date.now(),
                name: userName,
                country: userCountry,
                timestamp: Date.now(),
                likes: 0
            };

            messageInput.value = ''; 
            
            // 自分のメッセージを送信/保存
            if (isOnline && db) {
                try {
                    const messagesRef = collection(db, 'artifacts', appId, 'public', 'data', `messages_${currentTopicId}`);
                    await addDoc(messagesRef, messageData);
                    
                    const earnedScore = Math.floor(text.length * 0.5) + 10; 
                    addScore(earnedScore);
                    showToast(`メッセージを送ったよ！ スマイル +${earnedScore} ✨`);
                } catch (error) {
                    console.error("送信エラー:", error);
                    showToast("メッセージが送れなかったみたい💦", "error");
                }
            } else {
                if (!chats[currentTopicId]) chats[currentTopicId] = [];
                chats[currentTopicId].push(messageData);
                renderMessages();
                
                const earnedScore = Math.floor(text.length * 0.5) + 10; 
                addScore(earnedScore);
                showToast(`メッセージを送ったよ！（ローカル） スマイル +${earnedScore} ✨`);
            }

            // ★ 自分が発言した後にBOTを反応させる
            triggerBotResponse();
        }

        window.likeMessage = async function(messageId, currentLikes) {
            // BOTへの「いいね」はローカルで処理する
            if (messageId.startsWith('bot_') || !isOnline) {
                const msgs = chats[currentTopicId] || [];
                const targetMsg = msgs.find(m => m.id === messageId);
                if (targetMsg) {
                    targetMsg.likes = (targetMsg.likes || 0) + 1;
                    renderMessages();
                    addScore(5);
                    showToast("共感したよ！");
                }
                return;
            }

            if (isOnline && db && currentUser) {
                try {
                    const msgRef = doc(db, 'artifacts', appId, 'public', 'data', `messages_${currentTopicId}`, messageId);
                    await updateDoc(msgRef, {
                        likes: currentLikes + 1
                    });
                    addScore(5); 
                    showToast("共感したよ！");
                } catch (error) {
                    console.error("いいねエラー:", error);
                }
            } 
        };

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addScore(points) {
            userScore += points;
            
            scoreDisplay.textContent = `${userScore} ✨`;
            scoreDisplay.classList.add('text-white', 'scale-110');
            setTimeout(() => {
                scoreDisplay.classList.remove('text-white', 'scale-110');
            }, 300);

            let newRank = "おためしさん";
            if (userScore > 500) newRank = "カフェのアイドル";
            else if (userScore > 200) newRank = "常連さん";
            else if (userScore > 100) newRank = "おしゃべり上手";

            if (rankDisplay.textContent !== newRank) {
                rankDisplay.textContent = newRank;
                showToast(`🎉 クラスチェンジ！ [${newRank}] になりました！`);
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast flex items-center gap-3';
            if (type === 'info') {
                toast.style.background = 'rgba(167, 139, 250, 0.95)'; // パステルパープル
            } else if (type === 'error') {
                toast.style.background = 'rgba(251, 113, 133, 0.95)'; // ローズレッド
            }
            toast.innerHTML = `<i class="fa-solid fa-bell text-yellow-300"></i> <span>${message}</span>`;
            container.appendChild(toast);

            setTimeout(() => {
                if(toast.parentNode) toast.parentNode.removeChild(toast);
            }, 3000);
        }

        init();
        initNetwork();

    </script>
</body>
</html>
